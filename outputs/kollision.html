<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#00008F">
  <title>Lia – Kollision</title>
  <style>
    :root {
      --primary: #00008F;
      --primary-light: #1a1aaa;
      --bg: #EFEFEF;
      --white: #FFFFFF;
      --gray: #F5F5F5;
      --border: #DEDEDE;
      --text: #1A1A1A;
      --muted: #999;
      --green: #2E7D32;
      --r: 18px;
      --rs: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      overflow: hidden;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      height: 100%; height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER ─────────────────────────────── */
    #hdr {
      background: var(--primary);
      color: #fff;
      padding: 12px 14px 10px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      z-index: 10;
    }
    .hdr-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; flex-shrink: 0;
    }
    .hdr-info { flex: 1; }
    .hdr-name { font-weight: 700; font-size: 15px; }
    .hdr-sub  { font-size: 11px; opacity: .85; }
    #tts-btn {
      background: rgba(255,255,255,.15); border: none; border-radius: 50%;
      width: 34px; height: 34px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: background .2s; flex-shrink: 0; color: #fff;
    }
    #tts-btn:hover { background: rgba(255,255,255,.28); }
    #tts-btn.off   { opacity: .45; }

    .prog-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .prog-track { flex: 1; height: 4px; background: rgba(255,255,255,.3); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; background: #fff; border-radius: 2px; transition: width .5s ease; width: 0%; }
    .prog-pct   { font-size: 11px; opacity: .85; min-width: 30px; text-align: right; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500;
      background: rgba(255,255,255,.15); color: #fff;
      border: 1.5px solid rgba(255,255,255,.35); transition: all .3s;
    }
    .tag.done { background: #fff; color: var(--primary); border-color: #fff; }
    .tag.done::before { content: '✓ '; }

    /* ── CHAT ───────────────────────────────── */
    #chat {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 14px 12px 8px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; flex-direction: column; max-width: 83%; gap: 3px; }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 11px 14px; font-size: 15px; line-height: 1.5;
      border-radius: var(--r); word-break: break-word;
    }
    .bot  .bubble { background: #fff; color: var(--text); border-radius: 4px var(--r) var(--r) var(--r); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .user .bubble { background: var(--primary); color: #fff; border-radius: var(--r) 4px var(--r) var(--r); }

    .meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .bot  .meta { padding-left: 3px; }
    .user .meta { padding-right: 3px; justify-content: flex-end; }
    .spk-btn {
      background: none; border: none; cursor: pointer; font-size: 13px;
      opacity: .55; padding: 0 2px; transition: opacity .2s;
    }
    .spk-btn:hover { opacity: 1; }

    /* Typing */
    .typing-wrap { display: flex; flex-direction: column; max-width: 83%; align-self: flex-start; }
    .typing {
      display: flex; gap: 4px; padding: 13px 16px;
      background: #fff; border-radius: 4px var(--r) var(--r) var(--r);
      width: fit-content; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .typing span { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: bounce 1.2s infinite; opacity: .7; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{ transform: translateY(0); } 30%{ transform: translateY(-6px); } }

    /* Coverage card */
    .cov-card {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.10);
    }
    .cov-header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 60%, #43a047 100%);
      padding: 18px 16px 14px;
      text-align: center;
    }
    .cov-check-circle {
      width: 72px; height: 72px; margin: 0 auto 12px;
      background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      animation: popIn .45s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn { from{ transform:scale(0); opacity:0; } to{ transform:scale(1); opacity:1; } }
    .cov-check-circle svg { width: 40px; height: 40px; }
    .cov-header-title { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: .2px; }
    .cov-header-sub { color: rgba(255,255,255,.85); font-size: 13px; margin-top: 4px; }
    .cov-body { padding: 14px 16px; }
    .cov-row {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; font-weight: 500; color: var(--text);
      padding: 9px 0; border-bottom: 1px solid #f0f0f0;
    }
    .cov-row:last-of-type { border-bottom: none; }
    .cov-ck {
      width: 26px; height: 26px; border-radius: 50%;
      background: #e8f5e9; border: 1.5px solid #a5d6a7; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cov-ck svg { width: 14px; height: 14px; }
    .cov-car {
      margin-top: 12px; padding: 10px 12px;
      background: #f0f4ff; border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; color: var(--primary);
    }
    .cov-car-icon { font-size: 18px; }

    /* Garage cards */
    .garage-card {
      background: #fff; border-radius: var(--rs); padding: 12px;
      border: 1.5px solid var(--border); cursor: pointer;
      transition: border-color .2s, box-shadow .2s; margin-bottom: 6px;
    }
    .garage-card:active, .garage-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(56,53,164,.15); }
    .g-name { font-weight: 600; font-size: 14px; color: var(--text); }
    .g-addr { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .garage-bubble-hd {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      padding: 12px 14px; cursor: pointer; font-size: 15px; line-height: 1.5;
    }
    .garage-bubble-hd:active { background: rgba(0,0,0,.03); border-radius: var(--rs) var(--rs) 0 0; }
    .garage-chev { font-size: 18px; color: var(--primary); flex-shrink: 0; }
    .garage-list-wrap { overflow: hidden; transition: max-height .3s ease; padding: 0 10px 8px; }

    /* Complete card */
    .done-card { background: #fff; border-radius: var(--rs); padding: 18px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .done-emoji { font-size: 42px; animation: pop .4s cubic-bezier(.175,.885,.32,1.275); margin-bottom: 10px; }
    @keyframes pop { from{ transform: scale(0); opacity: 0; } to{ transform: scale(1); opacity: 1; } }
    .done-nr { font-size: 17px; font-weight: 700; color: var(--primary); margin: 6px 0; }
    .done-txt { font-size: 14px; color: #555; line-height: 1.55; }

    /* ── INPUT ──────────────────────────────── */
    #inp-area {
      background: #fff; border-top: 1px solid var(--border);
      padding: 8px 12px 10px; flex-shrink: 0;
    }

    #qr { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
    #qr:empty { display: none; margin: 0; }
    .qr {
      background: #fff; color: var(--primary);
      border: 1.5px solid var(--primary); border-radius: 20px;
      padding: 7px 14px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all .15s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    @media (hover: hover) { .qr:hover { background: var(--primary); color: #fff; } }
    .qr:active { opacity: 0.7; }

    #dp-area { display: none; align-items: center; gap: 8px; margin-bottom: 8px; }
    #dp-area.show { display: flex; }
    #dp {
      flex: 1; border: 1.5px solid var(--primary); border-radius: var(--rs);
      padding: 9px 12px; font-size: 15px; font-family: inherit; outline: none;
    }
    #dp-ok {
      background: var(--primary); color: #fff; border: none;
      border-radius: var(--rs); padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Geburtsdatum-Eingabe */
    #bday-area { display: none; align-items: center; gap: 8px; margin-bottom: 8px; }
    #bday-area.show { display: flex; }
    #bday-inp {
      flex: 1; border: 1.5px solid var(--primary); border-radius: var(--rs);
      padding: 9px 12px; font-size: 15px; font-family: inherit; outline: none;
    }
    /* Kalender-Icon: Label als Button, Input dahinter versteckt */
    #bday-cal-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      border: 1.5px solid var(--primary); border-radius: var(--rs);
      background: #fff; cursor: pointer; color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    #bday-hidden {
      position: absolute; opacity: 0; width: 100%; height: 100%;
      top: 0; left: 0; cursor: pointer;
    }
    #bday-ok {
      background: var(--primary); color: #fff; border: none;
      border-radius: var(--rs); padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Uhrzeit-Eingabe */
    #time-area { display: none; align-items: center; gap: 8px; margin-bottom: 8px; }
    #time-area.show { display: flex; }
    #time-inp {
      flex: 1; border: 1.5px solid var(--primary); border-radius: var(--rs);
      padding: 9px 12px; font-size: 15px; font-family: inherit; outline: none;
    }
    #time-ok {
      background: var(--primary); color: #fff; border: none;
      border-radius: var(--rs); padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Länder-Auswahl */
    #land-area { display: none; align-items: center; gap: 8px; margin-bottom: 8px; }
    #land-area.show { display: flex; }
    #land-sel {
      flex: 1; border: 1.5px solid var(--primary); border-radius: var(--rs);
      padding: 9px 12px; font-size: 15px; font-family: inherit; outline: none; background: #fff;
    }
    #land-ok {
      background: var(--primary); color: #fff; border: none;
      border-radius: var(--rs); padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Fahrzeug-Auswahl */
    #fahrzeug-area { display: none; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    #fahrzeug-area.show { display: flex; }
    #fahrzeug-manuell-btn {
      background: #fff; color: var(--primary); border: 1.5px solid var(--primary);
      border-radius: var(--rs); padding: 9px 16px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    #fahrzeug-manuell-wrap { display: none; align-items: center; gap: 8px; }
    #fahrzeug-manuell-wrap.show { display: flex; }
    #fahrzeug-txt {
      flex: 1; border: 1.5px solid var(--primary); border-radius: var(--rs);
      padding: 9px 12px; font-size: 15px; outline: none;
    }
    #fahrzeug-ok {
      background: var(--primary); color: #fff; border: none;
      border-radius: var(--rs); padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }


    .inp-row { display: flex; gap: 8px; align-items: center; }
    #msg-inp {
      flex: 1; background: var(--gray); border: 1.5px solid var(--border);
      border-radius: 24px; padding: 10px 16px; font-size: 15px; outline: none;
      transition: border-color .2s, background .2s;
    }
    #msg-inp:focus { border-color: var(--primary); background: #fff; }
    #msg-inp::placeholder { color: var(--muted); }
    #msg-inp:disabled { opacity: .5; }

    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all .15s;
    }
    #mic-btn { background: var(--gray); border: 1.5px solid var(--border); font-size: 18px; }
    #mic-btn.listening { background: #ffebee; border-color: #ef5350; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.06); } }
    #mic-btn:disabled { opacity: .4; cursor: not-allowed; }
    #snd-btn { background: var(--primary); color: #fff; font-size: 18px; }
    #snd-btn:hover { background: var(--primary-light); }
    #snd-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Summary table */
    .sum-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .sum-table td { padding: 5px 6px; vertical-align: top; }
    .sum-table td:first-child { color: var(--muted); width: 45%; }
    .sum-table td:last-child { font-weight: 500; }
  </style>
</head>

    <div id="time-area">

        </div>
        <button id="fahrzeug-manuell-btn">Fahrzeug manuell erfassen</button>

      <div id="fahrzeug-manuell-wrap">
        <input type="text" id="fahrzeug-txt" placeholder="z.B. VW Golf 2019">
        <button id="fahrzeug-ok">OK</button>
      </div>
    </div>
    <div class="inp-row">

      <button class="icon-btn" id="mic-btn" title="Spracheingabe">🎤</button>

      </button>
    </div>
  </footer>

</div>

FAKTEN FÜR DIESEN PROTOTYP (immer verwenden):
- Fahrzeug: Opel Corsa i30 CW

- Schadennummer: 11.111.111/1111

GESPRÄCHSFLUSS (Kollision – exakt diese Reihenfolge):
1. ERSTER HERGANG: User beschreibt was passiert ist (Freitext)

9. FAHRZEUG: "Stimmen die Angaben zu Ihrem Fahrzeug?"

NACH DER FAHRZEUGAUSWAHL (Schritte 10–18 werden automatisch vom System über Quick Replies erfasst):

- Frage NIE nach Informationen, die im STATUS bereits vorhanden sind (nicht null)

function renderHeader() {
  const keys = Object.keys(TAG_MAP);
  const done = keys.filter(k => S.data[k]);
  const pct  = Math.round(done.length / keys.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('pct').textContent  = pct + '%';
  document.getElementById('tags').innerHTML = keys.map(k =>
    `<span class="tag${S.data[k] ? ' done' : ''}">${TAG_MAP[k]}</span>`
  ).join('');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function ts() {
  return new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}

function addMsg(role, text, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const t = ts();
  if (role === 'bot') {
    div.innerHTML = `
      <div class="bubble">${html || esc(text)}</div>
      <div class="meta">
        <span>${t}</span>
        <button class="spk-btn" title="Vorlesen" onclick="speak(${JSON.stringify(text)})">🔊</button>
      </div>`;
    if (S.tts && text) ttsSpeak(text);
  } else {
    div.innerHTML = `<div class="bubble">${esc(text)}</div><div class="meta"><span>${t}</span></div>`;
  }
  $chat.appendChild(div);
  scroll();
  S.log.push({ role, text, t });
}

function showTyping() {
  const w = document.createElement('div');
  w.id = 'typing';
  w.className = 'typing-wrap';
  w.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  $chat.appendChild(w); scroll();
}
function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}
function scroll() {
  setTimeout(() => $chat.scrollTo({top: $chat.scrollHeight, behavior:'smooth'}), 50);
}

    schadenshergang:{ stage: 'schadenshergang',msg: 'Wie ist der Schaden entstanden?', type: 'qr', opts: ['Zusammenstoss mit Gegenstand', 'Auffahrunfall', 'Anderer Hergang'] },
    lenker:         { stage: 'lenker',         msg: getStageQ('lenker'),               type: 'qr', opts: getStageQR('lenker') },
    verantwortung:  { stage: 'verantwortung',  msg: getStageQ('verantwortung'),        type: 'qr', opts: getStageQR('verantwortung') },
    polizeirapport: { stage: 'polizeirapport', msg: getStageQ('polizeirapport'),       type: 'qr', opts: getStageQR('polizeirapport') },
    einfluss:       { stage: 'einfluss',       msg: getStageQ('einfluss'),             type: 'qr', opts: getStageQR('einfluss') },
    geschwindigkeit:{ stage: 'geschwindigkeit',msg: getStageQ('geschwindigkeit'),      type: 'qr', opts: getStageQR('geschwindigkeit') },
    unfallprotokoll:{ stage: 'unfallprotokoll',msg: getStageQ('unfallprotokoll'),      type: 'qr', opts: getStageQR('unfallprotokoll') },
  }[key];
  if (!cfg) return;
  S.stage = cfg.stage;
  addMsg('bot', cfg.msg || `Bitte geben Sie ${cfg.label} erneut ein.`);
  if (cfg.type === 'datum') {
    setQR(['Heute', 'Gestern', 'Genaues Datum']);
  } else if (cfg.type === 'bday') {
    $bdayHidden.max = new Date().toISOString().split('T')[0];
    $bdayHidden.min = '1900-01-01';
    $bdayArea.classList.add('show');
    setTimeout(() => $bdayInp.focus(), 50);
  } else if (cfg.type === 'time') {
    $timeArea.classList.add('show');
    setTimeout(() => $timeInp.focus(), 50);
  } else if (cfg.type === 'land') {
    $landArea.classList.add('show');
  } else if (cfg.type === 'fahrzeug') {
    $fahrzeugArea.classList.add('show');
  } else if (cfg.type === 'qr') {
    setQR(cfg.opts);
  } else {
    setEnabled(true);
    $inp.focus();
  }
}

// QR STAGE HELPERS
// ═══════════════════════════════════════════
const QR_SEQ = ['lenker','verantwortung','polizeirapport','einfluss','geschwindigkeit','unfallprotokoll'];

function getStageQ(stage) {
  const self = S.data.lenker === 'Sie selbst';
  return {
    lenker:          'Wer lenkte das Fahrzeug zum Zeitpunkt des Unfalls?',
    verantwortung:   'Fühlen Sie sich verantwortlich für diesen Unfall?',
    polizeirapport:  'Wurde ein Polizeirapport erstellt?',
    einfluss:        self ? 'Standen Sie zum Zeitpunkt des Unfalls unter Einfluss von Alkohol, Drogen, Medikamenten oder Übermüdung?' : 'Stand die Lenkerin/der Lenker unter Einfluss von Alkohol, Drogen, Medikamenten oder Übermüdung?',
    geschwindigkeit: self ? 'Haben Sie die Geschwindigkeit massiv überschritten?' : 'War massiv überhöhte Geschwindigkeit im Spiel?',
    unfallprotokoll: 'Wurde ein Unfallprotokoll erstellt?'
  }[stage] || '';
}

function getStageQR(stage) {
  return {
    lenker:          ['Sie selbst', 'Eine andere Person'],
    verantwortung:   ['Ja', 'Nein', 'Teilweise'],
    polizeirapport:  ['Ja', 'Nein'],
    einfluss:        ['Ja', 'Nein', 'Unbekannt'],
    geschwindigkeit: ['Ja', 'Nein', 'Unbekannt'],
    unfallprotokoll: ['Ja', 'Nein']
  }[stage] || [];
}

// Returns the first unfilled QR stage AFTER fromStage (or 'summary')
function advanceQR(fromStage) {
  let i = QR_SEQ.indexOf(fromStage) + 1;
  for (; i < QR_SEQ.length; i++) {
    if (!S.data[QR_SEQ[i]]) return QR_SEQ[i];
  }
  return 'summary';
}

// Returns the first unfilled QR stage starting FROM fromStage (or 'summary')
function firstUnfilledQR(fromStage) {
  let i = QR_SEQ.indexOf(fromStage);
  if (i < 0) i = 0;
  for (; i < QR_SEQ.length; i++) {
    if (!S.data[QR_SEQ[i]]) return QR_SEQ[i];
  }
  return 'summary';
}

function handleQR(opt) {
  clearInputUi();

  // Datepicker (Priorität: immer öffnen, auch im Edit-Modus; Datum-Wert wird über toBot gesetzt)
  if (opt === 'Genaues Datum') {
    $dpArea.classList.add('show');
    $dp.max = new Date().toISOString().split('T')[0];
    return;
  }

  // Edit-Modus: QR-Auswahl aktualisiert nur dieses eine Feld, dann zurück zur Zusammenfassung
  if (S.editMode) {
    const key = S.editStage;
    addMsg('user', opt);
    if (key === 'datum') {
      S.data.datum = opt === 'Heute' ? 'heute' : opt === 'Gestern' ? 'gestern' : opt;
    } else {
      S.data[key] = opt;
    }
    S.editMode = false;
    S.editStage = null;
    S.stage = 'summary';
    renderHeader();
    addMsg('bot', 'Danke! Hier sind Ihre aktualisierten Angaben:');
    setTimeout(showSummaryCard, 200);
    setTimeout(() => setQR(['Angaben bestätigen']), 500);
    return;
  }

  // Summary confirmed → coverage card → phone question
  if (opt === 'Angaben bestätigen' && S.stage === 'summary') {
    addMsg('user', opt);
    S.stage = 'coverage';
    showCoverageMsg('Sehr gut! Ich habe Ihren Schaden geprüft. Ich freue mich, Ihnen mitteilen zu dürfen, dass Ihr Schaden vollumfänglich gedeckt ist.');
    setTimeout(showRepairQuestion, 2800);
    return;
  }

  // Repair → bypass Claude for both options
  if (S.stage === 'repair') {
    S.data.repariert = (opt === 'Bereits repariert');
    addMsg('user', opt);
    if (opt === 'Reparatur gewünscht') {
      S.stage = 'garages';
      setTimeout(showGarageCards, 400);
    } else {
      S.stage = 'phone';
      setEnabled(true);
      addMsg('bot', 'Alles klar! Für allfällige Rückfragen: Wie lautet Ihre Telefonnummer?');
      setTimeout(() => $inp.focus(), 50);
    }
    return;
  }

  // Was ist zu Schaden gekommen? → hardcoded: Mein Fahrzeug
  if (opt === 'Mein Fahrzeug' && S.stage === 'wasGeschaedigt') {
    S.data.wasGeschaedigt = 'Mein Fahrzeug';
    addMsg('user', opt);
    S.stage = 'schadenshergang';
    renderHeader();
    addMsg('bot', 'Wie ist der Schaden entstanden?');
    setQR(['Zusammenstoss mit Gegenstand', 'Auffahrunfall', 'Anderer Hergang']);
    return;
  }

  // Kollisionsart → hardcoded: Zusammenstoss mit Gegenstand
  // If hergang already known from initial description → skip directly to QR stages
  if (opt === 'Zusammenstoss mit Gegenstand' && S.stage === 'schadenshergang') {
    S.data.schadenshergang = 'Zusammenstoss mit Gegenstand';
    addMsg('user', opt);
    renderHeader();
    // Pre-fill hergang from initial description if not already set
    if (!S.data.hergang && S.data.ersterHergang) {
      S.data.hergang = S.data.ersterHergang;
    }
    if (S.data.hergang) {
      // Skip hergang question, go to first unfilled QR stage
      const nxt = firstUnfilledQR('lenker');
      if (nxt === 'summary') {
        S.stage = 'summary';
        addMsg('bot', 'Vielen Dank für Ihre Angaben! Hier ist Ihre Zusammenfassung:');
        setTimeout(showSummaryCard, 200);
        setTimeout(() => setQR(['Angaben bestätigen']), 400);
      } else {
        S.stage = nxt;
        addMsg('bot', getStageQ(nxt));
        setQR(getStageQR(nxt));
      }
    } else {
      S.stage = 'hergang';
      addMsg('bot', 'Bitte beschreiben Sie den genauen Unfall- bzw. Schadenhergang.');
      setEnabled(true);
      setTimeout(() => $inp.focus(), 50);
    }
    return;
  }

  // Unified QR stage handler (lenker → verantwortung → polizeirapport → einfluss → geschwindigkeit → unfallprotokoll)
  if (QR_SEQ.includes(S.stage)) {
    S.data[S.stage] = opt;
    addMsg('user', opt);
    renderHeader();
    const nxt = advanceQR(S.stage);
    if (nxt === 'summary') {
      S.stage = 'summary';
      addMsg('bot', 'Vielen Dank für Ihre Angaben! Hier ist Ihre Zusammenfassung:');
      setTimeout(showSummaryCard, 200);
      setTimeout(() => setQR(['Angaben bestätigen']), 400);
    } else {
      S.stage = nxt;
      addMsg('bot', getStageQ(nxt));
      setQR(getStageQR(nxt));
    }
    return;
  }

  addMsg('user', opt);
  toBot(opt);
}

// ═══════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════
function buildStatusBlock() {
  const d = S.data;
  return `[STATUS – bereits erfasst: ersterHergang=${d.ersterHergang?'✓':'–'} | datum=${d.datum||'–'} | uhrzeit=${d.uhrzeit||'–'} | schadenortLand=${d.schadenortLand||'–'} | schadenortPlz=${d.schadenortPlz||'–'} | kontrollschild=${d.kontrollschild||'–'} | plz=${d.plz||'–'} | geburtsdatum=${d.geburtsdatum||'–'} | fahrzeug=${d.fahrzeug||'–'} | lenker=${d.lenker||'–'} | polizeirapport=${d.polizeirapport||'–'} | einfluss=${d.einfluss||'–'} | geschwindigkeit=${d.geschwindigkeit||'–'} | unfallprotokoll=${d.unfallprotokoll||'–'}]`;
}

async function callClaude(userMsg) {
  // Inject current data state so Claude knows what to skip
  const msgWithCtx = buildStatusBlock() + '\n' + userMsg;
  S.msgs.push({role:'user', content: msgWithCtx});
  // Keep history bounded
  const hist = S.msgs.slice(-MAX_HIST);

  const body = { model: MODEL, max_tokens: 1024, system: SYS, messages: hist };
  const res = await fetch(WORKER, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);

  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API error');

  const raw = data.content?.[0]?.text || '';
  S.msgs.push({role:'assistant', content: raw});

  // Parse JSON (strip markdown fences if present)
  try {
    const clean = raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    console.warn('JSON parse fail:', raw);
    return { text: raw, quickReplies: [], showDatepicker: false, extracted: {}, identExtracted: {}, nextStage: S.stage };
  }
}

// ═══════════════════════════════════════════
// MAIN HANDLER
// ═══════════════════════════════════════════
async function toBot(userMsg) {
  if (S.loading) return;
  S.loading = true;
  setEnabled(false);
  clearInputUi();

  // Edit mode: update field directly, no Claude call needed
  if (S.editMode) {
    const key = S.editStage;
    switch (key) {
      case 'ersterHergang':   S.data.ersterHergang = userMsg; break;
      case 'datum':
        if (userMsg === 'Heute') S.data.datum = 'heute';
        else if (userMsg === 'Gestern') S.data.datum = 'gestern';
        else S.data.datum = userMsg;
        break;
      case 'uhrzeit':         S.data.uhrzeit = userMsg; break;
      case 'schadenortLand':  S.data.schadenortLand = userMsg; break;
      case 'schadenortPlz':   S.data.schadenortPlz = userMsg; break;
      case 'kontrollschild':  S.data.kontrollschild = userMsg.toUpperCase().replace(/\s/g, ''); break;
      case 'plz':             S.data.plz = userMsg; break;
      case 'geburtsdatum':    S.data.geburtsdatum = userMsg; break;
      case 'fahrzeug':        S.data.fahrzeug = userMsg; break;
      case 'hergang':         S.data.hergang = userMsg; break;
    }
    S.editMode = false;
    S.editStage = null;
    S.stage = 'summary';
    renderHeader();
    addMsg('bot', 'Danke! Hier sind Ihre aktualisierten Angaben:');
    setTimeout(showSummaryCard, 200);
    setTimeout(() => setQR(['Angaben bestätigen']), 500);
    S.loading = false;
    setEnabled(true);
    return;
  }

  showTyping();
  try {
    const r = await callClaude(userMsg);
    removeTyping();

    // Update collected data from Claude's extraction
    if (r.extracted) {
      if (r.extracted.ersterHergang)   S.data.ersterHergang   = r.extracted.ersterHergang;
      if (r.extracted.datum)           S.data.datum           = r.extracted.datum;
      if (r.extracted.uhrzeit)         S.data.uhrzeit         = r.extracted.uhrzeit;
      if (r.extracted.lenker)          S.data.lenker          = r.extracted.lenker;
      if (r.extracted.polizeirapport)  S.data.polizeirapport  = r.extracted.polizeirapport;
      if (r.extracted.einfluss)        S.data.einfluss        = r.extracted.einfluss;
      if (r.extracted.geschwindigkeit) S.data.geschwindigkeit = r.extracted.geschwindigkeit;
      if (r.extracted.unfallprotokoll) S.data.unfallprotokoll = r.extracted.unfallprotokoll;
    }
    if (r.identExtracted) {
      if (r.identExtracted.kontrollschild) S.data.kontrollschild = r.identExtracted.kontrollschild.toUpperCase().replace(/\s/g,'');
      if (r.identExtracted.plz)            S.data.plz            = r.identExtracted.plz;
      if (r.identExtracted.geburtsdatum)   S.data.geburtsdatum   = r.identExtracted.geburtsdatum;
      if (r.identExtracted.schadenortPlz)  S.data.schadenortPlz  = r.identExtracted.schadenortPlz;
    }

    // Fallback direct extraction based on stage
    extractDirect(userMsg);
    renderHeader();

    let next = r.nextStage || S.stage;

    // If next stage is a QR stage already pre-filled from extraction, skip forward
    if (QR_SEQ.includes(next)) {
      let i = QR_SEQ.indexOf(next);
      while (i < QR_SEQ.length && S.data[QR_SEQ[i]]) i++;
      const effectiveNext = i < QR_SEQ.length ? QR_SEQ[i] : 'summary';
      if (effectiveNext !== next) {
        S.stage = effectiveNext;
        renderHeader();
        if (effectiveNext === 'summary') {
          addMsg('bot', 'Vielen Dank für Ihre Angaben! Hier ist Ihre Zusammenfassung:');
          setTimeout(showSummaryCard, 200);
          setTimeout(() => setQR(['Angaben bestätigen']), 400);
        } else {
          addMsg('bot', getStageQ(effectiveNext));
          setQR(getStageQR(effectiveNext));
        }
        S.loading = false;
        setEnabled(false);
        return;
      }
    }

    // Handle special stages
    if (next === 'summary') {
      addMsg('bot', r.text);
      setTimeout(showSummaryCard, 200);
      setTimeout(() => setQR(['Angaben bestätigen']), 400);
      S.stage = 'summary';
      S.loading = false;
      setEnabled(true);
      return;
    } else if (next === 'coverage') {
      showCoverageMsg(r.text);
      next = 'coverage';
      setTimeout(showRepairQuestion, 2800);
    } else if (next === 'garages') {
      setTimeout(showGarageCards, 400);
    } else if (next === 'complete') {
      setTimeout(() => showCompleteCard(r.text), 600);
      S.stage = 'complete';
      S.loading = false;
      return;
    } else {
      addMsg('bot', r.text);
    }

    // Show appropriate input UI based on next stage or Claude flags
    if (next === 'uhrzeit') {
      $timeArea.classList.add('show');
      setTimeout(() => $timeInp.focus(), 50);
    } else if (next === 'schadenortLand') {
      $landArea.classList.add('show');
    } else if (next === 'fahrzeug') {
      $fahrzeugArea.classList.add('show');
    } else if (r.showDatepicker) {
      if (next === 'geburtsdatum') {
        $bdayHidden.max = new Date().toISOString().split('T')[0];
        $bdayHidden.min = '1900-01-01';
        $bdayArea.classList.add('show');
        setTimeout(() => $bdayInp.focus(), 50);
      } else {
        $dpArea.classList.add('show');
        const today = new Date().toISOString().split('T')[0];
        $dp.max = today;
        $dp.min = '';
      }
    } else if (r.quickReplies && r.quickReplies.length) {
      setQR(r.quickReplies);
    }

    S.stage = next;

  } catch(err) {
    removeTyping();
    console.error(err);
    addMsg('bot', 'Entschuldigung, es ist ein technischer Fehler aufgetreten. Bitte versuchen Sie es erneut.');
  }

  S.loading = false;
  const noTextInput = ['uhrzeit','schadenortLand','fahrzeug','wasGeschaedigt','schadenshergang','lenker','verantwortung','polizeirapport','einfluss','geschwindigkeit','unfallprotokoll','coverage','repair','garages','complete'];
  if (!noTextInput.includes(S.stage)) { setEnabled(true); $inp.focus(); }
}

// ═══════════════════════════════════════════
// DIRECT EXTRACTION (fallback)
// ═══════════════════════════════════════════
function extractDirect(msg) {
  const st = S.stage;
  if ((st === 'ersterHergang' || st === 'init') && !S.data.ersterHergang && msg.length > 2)
    S.data.ersterHergang = msg;
  if (st === 'datum' || msg === 'Heute' || msg === 'Gestern') {
    if (!S.data.datum) {
      if (msg === 'Heute') S.data.datum = 'heute';
      else if (msg === 'Gestern') S.data.datum = 'gestern';
      else if (/\d{2}\.\d{2}\.\d{4}/.test(msg)) S.data.datum = msg;
    }
  }
  if (st === 'uhrzeit' && !S.data.uhrzeit && msg.includes(':')) S.data.uhrzeit = msg;
  if (st === 'schadenortPlz' && !S.data.schadenortPlz) S.data.schadenortPlz = msg;
  if (st === 'kontrollschild' && !S.data.kontrollschild && /^[A-Z]{2}\d{2,6}$/i.test(msg.replace(/\s/g,'')))
    S.data.kontrollschild = msg.toUpperCase().replace(/\s/g,'');
  if (st === 'plz' && !S.data.plz && /^\d{4}$/.test(msg.trim()))
    S.data.plz = msg.trim();
  if (st === 'geburtsdatum' && !S.data.geburtsdatum && /\d{2}\.\d{2}\.\d{4}/.test(msg))
    S.data.geburtsdatum = msg;
  if (st === 'hergang' && !S.data.hergang && msg.length > 2) S.data.hergang = msg;
  if (st === 'phone' && !S.data.telefon && msg.length >= 7) S.data.telefon = msg;
}

// ═══════════════════════════════════════════
// SEND TEXT
// ═══════════════════════════════════════════
function handleSend() {
  const v = $inp.value.trim();
  if (!v || S.loading) return;
  $inp.value = '';
  clearInputUi();
  addMsg('user', v);
  toBot(v);
}
$snd.addEventListener('click', handleSend);
$inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }});

// ═══════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════
const synth = window.speechSynthesis;
window.speak = ttsSpeak;
let ttsVoice = null;

function loadVoices() {
  const vs = synth.getVoices();
  if (!vs.length) return;
  ttsVoice = vs.find(v => v.lang.startsWith('de') && /female|anna|sara|steffi|helena/i.test(v.name))
          || vs.find(v => v.lang.startsWith('de'))
          || null;
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function formatForTTS(text) {
  // Kontrollschild-Muster (z.B. ZH12345) → "ZH 1 2 3 4 5"
  return text.replace(/\b([A-Za-z]{2})(\d{2,6})\b/g, (_, letters, digits) => {
    return letters.toUpperCase() + ' ' + digits.split('').join(' ');
  });
}

function ttsSpeak(text) {
  if (!S.tts || !synth) return;
  synth.cancel();
  // 50ms Delay nach cancel() – iOS verwirft sonst den speak()-Aufruf
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(formatForTTS(text));
    u.lang = 'de-CH'; u.rate = 1.0; u.pitch = 1.1;
    u.voice = ttsVoice;
    synth.speak(u);
  }, 50);
}

// TTS-Button: initial auf "aus" setzen (S.tts startet als false)
$ttsBt.classList.add('off');
$ttsBt.textContent = '🔇';

$ttsBt.addEventListener('click', () => {
  S.tts = !S.tts;
  $ttsBt.classList.toggle('off', !S.tts);
  $ttsBt.textContent = S.tts ? '🔊' : '🔇';
  if (S.tts) {
    // Audio-Kontext auf iOS/Android innerhalb der User-Geste entsperren
    const unlock = new SpeechSynthesisUtterance('');
    unlock.volume = 0;
    synth.speak(unlock);
  } else {
    synth.cancel();
  }
});

// ═══════════════════════════════════════════
// STT
// ═══════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, lastTranscript = '';

// Mic-Button ausblenden wenn STT nicht unterstützt
if (!SR) $mic.style.display = 'none';

function buildRec() {
  const r = new SR();
  r.lang = 'de-DE';
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onresult = e => {
    // Ab resultIndex akkumulieren (korrekte Mobile-Methode)
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const text = final || interim;
    if (text) { lastTranscript = text; $inp.value = text; }
  };

  r.onend = () => {
    const wasListening = listening;
    listening = false;
    rec = null;
    $mic.classList.remove('listening');
    if (wasListening && lastTranscript.trim()) {
      const msg = lastTranscript.trim();
      lastTranscript = '';
      $inp.value = '';
      setTimeout(() => { clearInputUi(); addMsg('user', msg); toBot(msg); }, 300);
    }
  };

  r.onerror = e => {
    listening = false;
    rec = null;
    $mic.classList.remove('listening');
    if (e.error === 'not-allowed') {
      alert('Bitte erlauben Sie den Mikrofonzugriff in den Browser-Einstellungen.');
    }
    // 'no-speech', 'aborted' → kein Alert nötig
  };

  r.onnomatch = () => {
    lastTranscript = '';
    $inp.value = '';
  };

  return r;
}

function startListen() {
  if (!SR || S.loading) return;
  synth.cancel();
  lastTranscript = '';
  $inp.value = '';
  rec = buildRec();        // Neue Instanz pro Aufnahme (Mobile-Pflicht)
  listening = true;
  $mic.classList.add('listening');
  try { rec.start(); } catch(e) {
    listening = false;
    rec = null;
    $mic.classList.remove('listening');
  }
}

function stopListen() {
  listening = false;
  $mic.classList.remove('listening');
  if (rec) { try { rec.stop(); } catch(e) {} }
}

$mic.addEventListener('click', () => {
  listening ? stopListen() : startListen();
});

// ═══════════════════════════════════════════
// DOWNLOAD / MAIL
// ═══════════════════════════════════════════
function buildLog() {
  const lines = [
    '=== LIA – Schadenmeldung Kollision ===',
    `Datum: ${new Date().toLocaleDateString('de-CH')}`,
    '',
    '=== Gesprächsverlauf ==='
  ];
  S.log.forEach(m => lines.push(`[${m.t}] ${m.role==='bot'?'Lia':'Sie'}: ${m.text}`));
  lines.push('', '=== Erfasste Daten ===');
  lines.push(`Was passiert:    ${S.data.ersterHergang||'–'}`);
  lines.push(`Datum:           ${S.data.datum||'–'}`);
  lines.push(`Uhrzeit:         ${S.data.uhrzeit||'–'}`);
  lines.push(`Schadenort Land: ${S.data.schadenortLand||'–'}`);
  lines.push(`Schadenort PLZ:  ${S.data.schadenortPlz||'–'}`);
  lines.push(`Kontrollschild:  ${S.data.kontrollschild||'–'}`);
  lines.push(`PLZ Wohnort:     ${S.data.plz||'–'}`);
  lines.push(`Geburtsdatum:    ${S.data.geburtsdatum||'–'}`);
  lines.push(`Fahrzeug:        ${S.data.fahrzeug||'–'}`);
  lines.push(`Geschädigtes:    ${S.data.wasGeschaedigt||'–'}`);
  lines.push(`Kollisionsart:   ${S.data.schadenshergang||'–'}`);
  lines.push(`Hergang:         ${S.data.hergang||'–'}`);
  lines.push(`Lenker:          ${S.data.lenker||'–'}`);
  lines.push(`Verantwortung:   ${S.data.verantwortung||'–'}`);
  lines.push(`Polizeirapport:  ${S.data.polizeirapport||'–'}`);
  lines.push(`Einfluss:        ${S.data.einfluss||'–'}`);
  lines.push(`Geschwindigkeit: ${S.data.geschwindigkeit||'–'}`);
  lines.push(`Unfallprotokoll: ${S.data.unfallprotokoll||'–'}`);
  lines.push(`Telefon:         ${S.data.telefon||'–'}`);
  lines.push(`Garage:          ${S.data.garage||'–'}`);
  lines.push('', 'Schadennummer: 11.111.111/1111');
  return lines.join('\n');
}
function downloadLog() {
  const b = new Blob([buildLog()],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `Schadenmeldung_Kollision_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}
function emailLog() {
  const t = buildLog();
  window.location.href = `mailto:?subject=${encodeURIComponent('Schadenmeldung 11.111.111/1111')}&body=${encodeURIComponent(t)}`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  renderHeader();
  setEnabled(false);

  await new Promise(r => setTimeout(r, 400));

  const greeting = 'Hallo. Ich bin Lia, Ihre digitale Assistentin. Ich helfe Ihnen, Ihren Kollisionsschaden schnell und einfach zu erfassen. Bitte schildern Sie mir kurz, was passiert ist.';
  addMsg('bot', greeting);

  // Seed conversation so Claude knows the context
  S.msgs.push({
    role: 'assistant',
    content: JSON.stringify({
      text: greeting, quickReplies: [], showDatepicker: false,
      showTimepicker: false, showLandpicker: false, showFahrzeugpicker: false,
      extracted: { ersterHergang: null, datum: null },
      identExtracted: { kontrollschild: null, plz: null, geburtsdatum: null, schadenortPlz: null },
      nextStage: 'ersterHergang'
    })
  });

  S.stage = 'ersterHergang';
  setEnabled(true);
  $inp.focus();
}

init();
</script>
